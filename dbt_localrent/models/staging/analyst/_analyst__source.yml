sources:
- name: analyst
  description: "Операционная аналитическая схема с сырыми журналами событий (просмотры, поиски, показы, бронирования) и справочными таблицами."
  tables:
  - name: stat_results
    description: "Сохраняет сведения о результате поиска переданных клиенту"
    columns:
      - name: timestamp
        description: >
            Заполняется автоматически (метка времени заси в БД). 
            Это не самое оптимальное решение, так как может иметь дубли значений, для двух разных поисков. 
      - name: search_id
        description: "Идентификатор поиска, генерируется как md5 от набора входных условий (фильтров) поиска"
      - name: session_id
        description: > 
            Идентификатор сессии, берется из куки session. 
            Может быть пустым (в браузере выключены куки, это был запрос в апи от стороннего клиента - не браузер, 
            не поддерживает работу с куками)
      - name: search_uuid
        description: >
            Идентификатор поиска присланный клиентом. Просто в запросе клиента квери атрибут search_uuid. 
            Для нашего поиска на фронте реализован механизм генерации и передачи, сторонние клиенты сокрее всего вообще не шлют (Не было проверок качества данных)
      - name: aff_id
        description: >
            Идентификатор аффилиата, берется из параметра запрос aff_id. 
            Шлет клиент в запросе, не обязательное поле. Если в запросе не было, 
            то дополнительно бек пытается прочесть из куки mrc_last_affiliate
      - name: referer
        description: "значение REFERER из запроса поиска"
      - name: referer_host
        description: "хост из REFERER (без протокола и пути)"
      - name: referer_path
        description: "путь из REFERER (без протокола и хоста)"
      - name: source
        description: > 
            Значение владельца апи ключа. Берется их входящих параметров запроса - поле key. 
            Указывает пользователя - владельца ключа (наш фронтенд, или сторонние клиенты обращающиеся в наш поиск)
      - name: pickup_place_id
        description: "Идентификатор места получения (Справочник places, поле id)"
      - name: dropoff_place_id
        description: "Идентификатор места возврата (Справочник places, поле id)"
      - name: pickup_city_id
        description: "Идентификатор города получения (Справочник cities, поле id)"
      - name: dropoff_city_id
        description: "Идентификатор города возврата (Справочник cities, поле id"
      - name: country_id
        description: "Идентификатор страны (Справочник countries, поле id)"
      - name: offset
        description: "Смещение окна выборки автомобилей"
      - name: limit
        description: "Размер окна выборки автомобилей"
      - name : cars
        description: "Количество автомобилей в результате поиска"
      - name: prices
        description: > 
            Список объектов отражающих сведения о ценах. Список имеет размерность совпадающую со списком cars_all.
            Дополнительно добавляются записи цен экстрасов"
      - name: params
        description: "Объект со всеми входящими параметрами запроса (JSON)"
      - name: user_uuid
        description: > 
            Идентификатор пользователя. 
            Присылает фронтенд в заголовке запроса USER_UUID (Не гарантировано). Другие потребители апи скорее всего не шлют ничего
      - name: page_direct
        description: "Признак поиска с прямого захода на страницу направления. Вычисляет фронт и присылает в заголовке PAGE_DIRECT"
      - name: page_referer
        description: "Указатель на страницу направления с который выполнился поиск. Присылает фронтенд в заголовке PAGE_REFERER"

  - name: stat_searches
    description: "Фиксирует события поиска сохраняя сырые данные выборки, по которым готовилось представление ответа"
    columns:
      - name: timestamp
        description: > 
            Заполняется автоматически (метка времени заси в БД). Это было плохое решение. 
            Мое предложение заполнять меткой времени поступления поискового запроса
      - name: search_id
        description: "Идентификатор поиска, генерируется как md5 от набора входных условий (фильтров) поиска"
      - name: session_id
        description: > 
            Идентификатор сессии, берется из куки session. 
            Может быть пустым (в браузере выключены куки, это был запрос в апи от стороннего клиента - не браузер, 
            не поддерживает работу с куками)
      - name: search_uuid
        description: >
            Идентификатор поиска присланный клиентом. Просто в запросе клиента квери атрибут search_uuid. 
            Для нашего поиска на фронте реализован механизм генерации и передачи, 
            сторонние клиенты сокрее всего вообще не шлют (Не было проверок качества данных)
      - name: aff_id
        description: >
            Идентификатор аффилиата, берется из параметра запрос aff_id. 
            Шлет клиент в запросе, не обязательное поле. Если в запросе не было, 
            то дополнительно бек пытается прочесть из куки mrc_last_affiliate
      - name: referer
        description: "значение REFERER из запроса поиска"
      - name: referer_host
        description: "хост из REFERER (без протокола и пути)"
      - name: referer_path
        description: "путь из REFERER (без протокола и хоста)"
      - name: source
        description: > 
            Значение владельца апи ключа. Берется их входящих параметров запроса - поле key. 
            Указывает пользователя - владельца ключа (наш фронтенд, или сторонние клиенты обращающиеся в наш поиск)
      - name: pickup_place_id
        description: "Идентификатор места получения (Справочник places, поле id)"
      - name: dropoff_place_id
        description: "Идентификатор места возврата (Справочник places, поле id)"
      - name: pickup_city_id
        description: "Идентификатор города получения (Справочник cities, поле id)"
      - name: dropoff_city_id
        description: "Идентификатор города возврата (Справочник cities, поле id)"
      - name: country_id
        description: "Идентификатор страны (Справочник countries, поле id)"
      - name: params
        description: "Объект со всеми входящими параметрами запроса (JSON)"
      - name: cars_all
        description: > 
            Список всех автомобилей, которые были в выборке для ответа на запрос. 
            Список имеет размерность совпадающую со списком prices_all
      - name : cars_filtered
        description: "Список идентификаторов автомобилей подходящий под условия выборки (фильтры). Может быть достаточно большим"
      - name: user_agent
        description: "Значение USER_AGENT из запроса поиска"
      - name: user_ip
        description: "Значение USER_IP из запроса поиска"
      - name: user_device
        description: "Устройство пользователя, по UserAgent"
      - name: prices
        description: > 
            Список объектов отражающих сведения о ценах. 
            Список имеет размерность совпадающую со списком cars_all. 
            Дополнительно добавляются записи цен экстрасов. Может содержать пустые строки. 
      - name: is_initial
        description: > 
            Признак "первого" поиска. 
            Поиск который исполняется с дефолтным наброром фильтров при заходе на страницу направления. 
            Значение присылает клиент в параметрах запроса поиска
      - name: search_feed
        description: > 
            Просто какой-то параметр который присылает фронт в поисковом запросе. 
            Скорее всего нафиг не нужено. Попозже выясним у фронтенда
      - name: score_version
        description: > 
            Просто какой-то параметр который присылает фронт в поисковом запросе. 
            Скорее всего нафиг не нужено. Попозже выясним у фронтенда
      - name: user_uuid
        description: > 
            Идентификатор пользователя. Присылает фронтенд в заголовке запроса USER_UUID. 
            Другие потребители апи скорее всего не шлют ничего
      - name: page_direct
        description: "Признак поиска с прямого захода на страницу направления. Вычисляет фронт и присылает в заголовке PAGE_DIRECT"
      - name: page_referer
        description: "Указатель на страницу направления с который выполнился поиск. Присылает фронтенд в заголовке PAGE_REFERER"